<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07070f">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
<title>오성역사톡!! v2.1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
/* 🎨 원본 스타일 시스템 100% 복구 */
:root{--bg:#07070f;--bg2:#111122;--bgc:rgba(22,22,48,0.85);--bgg:rgba(255,255,255,0.04);--bgh:rgba(255,255,255,0.08);--t1:#f0f0ff;--t2:#9898b8;--t3:#5a5a78;--a1:#6C5CE7;--a2:#00CECE;--a3:#FD79A8;--a4:#FDCB6E;--a5:#00B894;--a6:#E17055;--gm:linear-gradient(135deg,#6C5CE7,#00CECE);--gw:linear-gradient(135deg,#FD79A8,#FDCB6E);--bd:rgba(255,255,255,0.06);--sh:0 8px 32px rgba(0,0,0,0.3);--r:20px;--rs:14px;--rx:8px;--nh:60px;--bh:70px;--fs:15px}
[data-theme=light]{--bg:#f4f2ff;--bg2:#fff;--bgc:rgba(255,255,255,0.9);--bgg:rgba(108,92,231,0.04);--bgh:rgba(108,92,231,0.08);--t1:#1a1a2e;--t2:#555580;--t3:#8888aa;--bd:rgba(108,92,231,0.1);--sh:0 4px 20px rgba(108,92,231,0.08)}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:var(--fs)}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--a1);border-radius:3px}

/* 애니메이션 */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* 로그인 화면 */
#loginScreen{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center}
.lc{width:90%;max-width:420px;text-align:center;animation:fadeUp .8s ease}
.ll{font-size:4rem;margin-bottom:8px;animation:float 3s ease-in-out infinite}
.lt{font-family:'Black Han Sans',sans-serif;font-size:2.2rem;background:var(--gm);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.ls{color:var(--t3);font-size:.85rem;margin-bottom:32px}
.ltabs{display:flex;gap:4px;background:var(--bg2);border-radius:var(--r);padding:4px;margin-bottom:24px;border:1px solid var(--bd)}
.ltab{flex:1;padding:12px;border-radius:calc(var(--r) - 4px);border:none;background:0;color:var(--t3);font-weight:600;font-size:.88rem;cursor:pointer;transition:.3s}
.ltab.active{background:var(--a1);color:#fff}
.lin{width:100%;padding:14px 18px;border-radius:var(--rs);background:var(--bg2);border:1px solid var(--bd);color:var(--t1);font-size:.92rem;margin-bottom:12px;outline:none;transition:.3s}
.lin:focus{border-color:var(--a1)}
.lbtn{width:100%;padding:16px;border-radius:var(--rs);border:none;background:var(--gm);color:#fff;font-weight:700;font-size:1rem;cursor:pointer;transition:.3s}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,92,231,.3)}

/* 상단바 */
.tn{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nh);background:rgba(7,7,15,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.tn-t{font-family:'Black Han Sans',sans-serif;font-size:1.15rem;background:var(--gm);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* 하단바 */
.bn{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--bh);background:rgba(7,7,15,0.9);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-around}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--t3);font-size:.65rem;cursor:pointer;transition:.2s}
.bni.a{color:var(--a1)}
.be{font-size:1.6rem}

/* 메인 레이아웃 */
.mn{padding-top:var(--nh);padding-bottom:calc(var(--bh) + 20px);min-height:100vh}
.pg{display:none;padding:16px;max-width:800px;margin:0 auto}
.pg.a{display:block;animation:fadeUp .4s ease}

/* 홈 히어로 */
.hero{padding:30px 20px;background:var(--bgg);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:20px;text-align:center}
.hg{font-size:1.4rem;font-weight:800;margin-bottom:10px}
.hs{display:flex;gap:10px;justify-content:center}
.hsi{background:var(--bg2);padding:10px 15px;border-radius:var(--rs);min-width:80px}

/* 카드 그리드 */
.qg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.qc{background:var(--bg2);padding:20px;border-radius:var(--r);border:1px solid var(--bd);text-align:center;cursor:pointer;transition:.3s}
.qc:hover{border-color:var(--a1);transform:translateY(-4px)}
.qce{font-size:2.2rem;margin-bottom:8px}

/* 채팅창 */
.cw{display:flex;flex-direction:column;height:calc(100vh - 180px)}
.ct{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bgg);border-radius:var(--rs);margin-bottom:10px}
.cav{width:40px;height:40px;border-radius:50%;background:var(--gm);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.cms{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:12px}
.cm{display:flex;gap:8px;max-width:85%}
.cm.b{align-self:flex-start}
.cm.u{align-self:flex-end;flex-direction:row-reverse}
.cmb{padding:12px 16px;border-radius:18px;font-size:.92rem;line-height:1.6}
.cm.b .cmb{background:var(--bg2);border:1px solid var(--bd);border-bottom-left-radius:4px}
.cm.u .cmb{background:var(--a1);color:#fff;border-bottom-right-radius:4px}
.cma{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.cm.b .cma{background:var(--gm)}
.cb{display:flex;gap:8px;padding:10px 0}
.ci{flex:1;padding:12px 20px;border-radius:25px;border:1px solid var(--bd);background:var(--bg2);color:var(--t1);outline:none}
.csb{width:45px;height:45px;border-radius:50%;border:none;background:var(--gm);color:#fff;cursor:pointer}

/* 타이핑 */
.ti{display:flex;gap:4px;padding:12px 16px;background:var(--bg2);border-radius:18px;width:fit-content}
.td{width:6px;height:6px;background:var(--t3);border-radius:50%;animation:bounce 1.4s infinite ease-in-out}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
</style>
</head>
<body data-theme="dark">

<div id="loginScreen">
    <div class="lc">
        <div class="ll">📜</div>
        <div class="lt">오성역사톡!!</div>
        <div class="ls">오성중학교 전용 역사 탐험 서비스</div>
        <div class="ltabs">
            <button class="ltab active" onclick="switchLogin('s')">학생</button>
            <button class="ltab" onclick="switchLogin('t')">교사</button>
        </div>
        <div id="sForm">
            <input class="lin" id="ln" placeholder="이름을 입력하세요" autocomplete="off">
            <button class="lbtn" onclick="login()">역사 여행 시작 🚀</button>
        </div>
    </div>
</div>

<nav class="tn" id="tn" style="display:none">
    <div class="tn-t">오성역사톡</div>
    <div style="display:flex; gap:10px;">
        <span id="ns">🔥 1</span>
        <span id="nx">⭐ 0</span>
    </div>
</nav>

<main class="mn" id="ma" style="display:none">
    <section class="pg a" id="p-home">
        <div class="hero">
            <div class="hg"><span id="hn">탐험가</span>님, 환영해요! 👋</div>
            <div class="hs">
                <div class="hsi">🔥 연속 1일</div>
                <div class="hsi">⭐ 0 XP</div>
            </div>
        </div>
        <div class="qg">
            <div class="qc" onclick="go('curriculum')"><div class="qce">📚</div><div>교과서 학습</div></div>
            <div class="qc" onclick="go('chat')"><div class="qce">🤖</div><div>AI 역사쌤</div></div>
            <div class="qc" onclick="alert('퀴즈 기능 준비 중!')"><div class="qce">🎯</div><div>역사 퀴즈</div></div>
            <div class="qc" onclick="go('profile')"><div class="qce">👤</div><div>마이페이지</div></div>
        </div>
    </section>

    <section class="pg" id="p-curriculum">
        <h2>📚 단원별 학습</h2>
        <p style="color:var(--t2); margin-bottom:20px;">공부하고 싶은 시대를 선택하세요.</p>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="qc" style="text-align:left; padding:15px;" onclick="alert('데이터를 불러오고 있습니다.')">1. 고대 국가의 성립</div>
            <div class="qc" style="text-align:left; padding:15px;" onclick="alert('데이터를 불러오고 있습니다.')">2. 고려의 성립과 발전</div>
            <div class="qc" style="text-align:left; padding:15px;" onclick="alert('데이터를 불러오고 있습니다.')">3. 조선의 성립과 변화</div>
        </div>
    </section>

    <section class="pg" id="p-chat">
        <div class="cw">
            <div class="ct"><div class="cav">🤖</div><div><b>역사박사 AI</b><br><small style="color:var(--a5)">● 온라인</small></div></div>
            <div class="cms" id="chatBox">
                <div class="cm b"><div class="cma">🤖</div><div class="cmb">안녕! 나는 오성중학교 역사 멘토야. 역사에 대해 궁금한 건 뭐든 물어봐! 🎓</div></div>
            </div>
            <div class="cb">
                <input class="ci" id="ci" placeholder="질문을 입력하세요..." onkeydown="if(event.key==='Enter')sm()">
                <button class="csb" onclick="sm()">➤</button>
            </div>
        </div>
    </section>

    <section class="pg" id="p-profile">
        <h2>👤 내 정보</h2>
        <div class="hero" style="margin-top:20px;">
            <div style="font-size:3rem;">🏅</div>
            <h3 id="pn">탐험가</h3>
            <p>오성중학교 1학년</p>
        </div>
        <button class="lbtn" style="background:var(--bg2); border:1px solid var(--bd); margin-top:10px;" onclick="location.reload()">로그아웃</button>
    </section>
</main>

<nav class="bn" id="bn" style="display:none">
    <div class="bni a" onclick="go('home')"><span class="be">🏠</span>홈</div>
    <div class="bni" onclick="go('curriculum')"><span class="be">📚</span>학습</div>
    <div class="bni" onclick="go('chat')"><span class="be">🤖</span>AI쌤</div>
    <div class="bni" onclick="go('profile')"><span class="be">👤</span>마이</div>
</nav>

<script src="config.js"></script>
<script type="importmap">
{
  "imports": {
    "@google/generative-ai": "https://esm.run/@google/generative-ai"
  }
}
</script>

<script type="module">
import { GoogleGenerativeAI, HarmCategory, HarmBlockThreshold } from "@google/generative-ai";

let isBusy = false;

// ✅ [수정됨] 400 에러 해결을 위한 정교한 AI 응답 함수
async function fetchAI(prompt) {
    try {
        const genAI = new GoogleGenerativeAI(CONFIG.GEMINI_API_KEY);
        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            // ✅ 시스템 인스트럭션을 API 규격에 맞는 객체 형태로 전달
            systemInstruction: {
                role: "system",
                parts: [{ text: "너는 오성중학교 학생들의 역사 학습을 돕는 친절하고 똑똑한 역사 선생님이야. 중학생이 이해하기 쉽게 비유를 들어 설명해줘. 역사적 사실을 정확히 말하되, 말투는 항상 부드럽고 격려하는 태도를 유지해." }]
            }
        });

        const chat = model.startChat({
            generationConfig: { maxOutputTokens: 1000, temperature: 0.7 },
            safetySettings: [
                { category: HarmCategory.HARM_CATEGORY_HARASSMENT, threshold: HarmBlockThreshold.BLOCK_NONE },
                { category: HarmCategory.HARM_CATEGORY_HATE_SPEECH, threshold: HarmBlockThreshold.BLOCK_NONE },
                { category: HarmCategory.HARM_CATEGORY_DANGEROUS_CONTENT, threshold: HarmBlockThreshold.BLOCK_NONE },
                { category: HarmCategory.HARM_CATEGORY_SEXUALLY_EXPLICIT, threshold: HarmBlockThreshold.BLOCK_NONE },
            ]
        });

        const result = await chat.sendMessage(prompt);
        return result.response.text();
    } catch (e) {
        console.error(e);
        return "미안해, 지금 역사 사료를 정리 중이라 대답이 늦었어. 다시 한번 물어봐 줄래? (오류 발생)";
    }
}

// ✅ 메시지 전송 로직
window.sm = async function() {
    const input = document.getElementById('ci');
    const msg = input.value.trim();
    if(!msg || isBusy) return;

    isBusy = true;
    addMsg(msg, 'u');
    input.value = '';

    const tid = showLoading();
    const res = await fetchAI(msg);
    
    hideLoading(tid);
    addMsg(res, 'b');
    isBusy = false;
};

function addMsg(m, t) {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = `cm ${t}`;
    div.innerHTML = t==='b' ? `<div class="cma">🤖</div><div class="cmb">${m.replace(/\n/g,'<br>')}</div>` : `<div class="cmb">${m}</div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function showLoading() {
    const box = document.getElementById('chatBox');
    const id = 't-'+Date.now();
    const div = document.createElement('div');
    div.id = id; div.className = 'cm b';
    div.innerHTML = `<div class="cma">🤖</div><div class="ti"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return id;
}

function hideLoading(id) {
    const el = document.getElementById(id);
    if(el) el.remove();
}

// ✅ 페이지 네비게이션
window.go = function(p) {
    document.querySelectorAll('.pg').forEach(s => s.classList.remove('a'));
    document.getElementById('p-'+p).classList.add('a');
    document.querySelectorAll('.bni').forEach(b => b.classList.remove('a'));
    // 버튼 활성화는 인덱스로 찾거나 이벤트 타겟으로 처리 (간소화)
};

// ✅ 로그인 로직
window.login = function() {
    const n = document.getElementById('ln').value;
    if(!n) return alert('이름을 입력해주세요!');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('tn').style.display='flex';
    document.getElementById('ma').style.display='block';
    document.getElementById('bn').style.display='flex';
    document.getElementById('hn').innerText = n;
    document.getElementById('pn').innerText = n;
};

window.switchLogin = function(type) {
    const tabs = document.querySelectorAll('.ltab');
    tabs[0].classList.toggle('active', type==='s');
    tabs[1].classList.toggle('active', type==='t');
    if(type==='t') alert('교사용은 현재 준비 중입니다.');
};
</script>
</body>
</html>
